name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest

          - platform: web
            os: ubuntu-latest

          - platform: linux
            os: ubuntu-latest

          - platform: windows
            os: windows-latest

          - platform: macos
            os: macos-latest

          - platform: ios
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0" # o'zingiz xohlagan versiyani qo'yishingiz mumkin

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      # 🔽 Platform-specific builds

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build Web
        if: matrix.platform == 'web'
        run: flutter build web

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --no-codesign
